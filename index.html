<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lean Founders — Feedback &amp; distribution for founders</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f1f1e9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #__bundler_loading {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font:
          13px/1.4 -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: #666;
        background: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        z-index: 10000;
      }
      #__bundler_thumbnail {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f1e9;
        z-index: 9999;
      }
      #__bundler_thumbnail svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #__bundler_placeholder {
        color: #999;
        font-size: 14px;
      }
    </style>
    <noscript>
      <style>
        #__bundler_loading {
          display: none;
        }
      </style>
      <div
        style="
          position: fixed;
          bottom: 12px;
          left: 12px;
          font:
            13px/1.4 -apple-system,
            BlinkMacSystemFont,
            sans-serif;
          color: #999;
          background: rgba(255, 255, 255, 0.9);
          padding: 6px 12px;
          border-radius: 6px;
          box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
          z-index: 10000;
        "
      ></div>
    </noscript>
  </head>

    <div id="__bundler_loading">Unpacking...</div>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime }),
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime }),
                );
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

r(--ink);\n    text-decoration: none;\n  }\n  .brand .mark {\n    width: 22px; height: 22px; border-radius: 7px; flex: 0 0 auto;\n    background: var(--ink); position: relative;\n  }\n  .brand .mark::before {\n    content:\"\"; position:absolute; inset: 5px; border-radius: 3px;\n    border: 2px solid var(--bg); border-right-color: transparent; border-bottom-color: transparent;\n    transform: rotate(-45deg);\n  }\n  .nav-center { display: flex; align-items: center; gap: 2px; padding: 6px; }\n  .nav-center a {\n    font-size: 15px; font-weight: 500; color: var(--ink-soft); text-decoration: none; white-space: nowrap;\n    padding: 8px 16px; border-radius: 999px; transition: background .2s, color .2s;\n  }\n  .nav-center a:hover { background: rgba(44,31,24,0.06); color: var(--ink); }\n  .nav-cta {\n    padding: 12px 22px; font-weight: 600; font-size: 15px; color: var(--ink);\n    border: none; cursor: pointer; transition: transform .18s var(--ease), background .2s;\n    background: rgba(252,250,245,0.62);\n  }\n  .nav-cta:hover { transform: translateY(-1px); background: rgba(252,250,245,0.92); }\n  @media (max-width: 860px) { .nav-center { display: none; } }\n\n  /* nav intro animation (self-playing) */\n  @media (prefers-reduced-motion: no-preference) {\n    .nav .pill { animation: navIn .7s var(--ease) both; }\n    .nav .pill:nth-child(2) { animation-delay: .08s; }\n    .nav .pill:nth-child(3) { animation-delay: .16s; }\n  }\n  @keyframes navIn { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }\n\n  /* ============================ HERO ============================ */\n  .hero {\n    display: grid; grid-template-columns: 1fr 1fr;\n    min-height: 100svh; gap: clamp(24px, 4vw, 56px);\n    align-items: center;\n    padding: 120px clamp(20px, 4vw, 56px) 28px;\n    max-width: 1480px; margin: 0 auto;\n  }\n  .hero-copy { max-width: 540px; justify-self: end; width: 100%; }\n  .hero h1 {\n    font-weight: 400; font-size: clamp(40px, 5. -radius: var(--rad);\n    background: linear-gradient(145deg, #e6e8da 0%, #cdd6c3 100%);\n    box-shadow: 0 50px 90px -50px rgba(31,45,39,0.5);\n  }\n  .hero-cell.b { box-shadow: 0 36px 70px -46px rgba(31,45,39,0.5); }\n  .hero-photo image-slot { width: 100%; height: 100%; }\n  .hero-photo .glass-cap {\n    position: absolute; left: 18px; bottom: 18px; z-index: 3;\n    display: inline-flex; align-items: center; gap: 10px; white-space: nowrap;\n    background: rgba(20,12,8,0.32); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);\n    border: 1px solid rgba(255,255,255,0.18); border-radius: 999px;\n    padding: 9px 16px; color: #fdf6ee; font-size: 13.5px; font-weight: 500;\n  }\n  .hero-photo .glass-cap .dot { width: 8px; height: 8px; border-radius: 50%; background: #6fcf97; box-shadow: 0 0 0 4px rgba(111,207,151,0.25); }\n\n  @media (max-width: 900px) {\n    .hero { grid-template-columns: 1fr; min-height: auto; padding-top: 104px; }\n    .hero-copy { justify-self: stretch; max-width: none; order: 1; }\n    .hero-photo { order: 2; height: 62svh; min-height: 420px; }\n  }\n\n  /* hero reveal (self-playing) */\n  @media (prefers-reduced-motion: no-preference) {\n    .hero-copy > * { animation: heroUp .8s var(--ease) both; }\n    .hero-copy > *:nth-child(2) { animation-delay: .06s; }\n    .hero-copy > *:nth-child(3) { animation-delay: .12s; }\n    .hero-copy > *:nth-child(4) { animation-delay: .18s; }\n    .hero-copy > *:nth-child(5) { animation-delay: .24s; }\n    .hero-photo { animation: heroPhoto 1.1s var(--ease) both; }\n  }\n  @keyframes heroUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }\n  @keyframes heroPhoto { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: none; } }\n\n  /* hard failsafe: a throttled animation clock must never leave above-the-fold content hidden */\n  html.entrance-done .nav .pill,\n  html.entrance-done .hero-copy > *,\n  html.entrance-done .hero-photo { opacity: 1 !important; transform: none !important; animation: none !important; }\n\n  /* ============================ MARQUEE ============================ */\n  .marquee {\n    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);\n    overflow: hidden; padding: 18px 0; background: var(--bg-2);\n  }\n  .marquee-track { display: flex; width: max-content; animation: scrollx 32s linear infinite; }\n  .marquee:hover .marquee-track { animation-play-state: paused; }\n  .marquee-track span {\n    display: inline-flex; align-items: center; gap: 22px; padding: 0 22px;\n    font-size: clamp(20px, 2.4vw, 30px); font-weight: 400; letter-spacing: -0.02em; color: var(--ink);\n    white-space: nowrap;\n  }\n  .marquee-track span::after { content: \"✺\"; color: var(--accent); font-size: 0.7em; }\n  @keyframes scrollx { to { transform: translateX(-50%); } }\n\n  /* ============================ WHY NOW (dark) ============================ */\n  .whynow {\n    position: relative; background: var(--dark); color: #e9efe9;\n    overflow: hidden; min-height: 100svh;\n    display: flex; align-items: center; justify-content: center;\n    text-align: center; padding: clamp(90px, 14vh, 160px) 20px;\n  }\n  #asciiCanvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.9; }\n  .whynow-inner { position: relative; z-index: 2; max-width: 880px; }\n  .whynow .seq {\n    font-weight: 400; font-size: clamp(30px, 4.6vw, 60px); line-height: 1.1;\n    letter-spacing: -0.03em; margin: 0; min-height: 1.2em; color: #eef3ee; text-wrap: balance;\n  }\n  .whynow .seq .em { color: #7fc4a3; }\n  .whynow .stat {\n    font-weight: 400; font-size: clamp(54px, 9vw, 120px); line-height: 0.95;\n    letter-spacing: -0.04em; color: #fff;\n  }\n  .whynow .foot {\n    margin: 30px auto 0; max-width: 50ch; color: #a9b6ac; font-size: clamp(16px,1.5vw,19px);\n  }\n  .whynow .label { margin-bottom: 26px; }\n\n  /* word-by-word reveal helper */\n  .reveal-words .w { display: inline-block; opacity: 0; transform: translateY(14px); }\n  .reveal-words.in .w { animation: wordUp .6s var(--ease) forwards; }\n  @keyframes wordUp { to { opacity: 1; transform: none; } }\n\n  /* ============================ SPLIT ROWS (What You Get) ============================ */\n  .feature {\n    display: grid; grid-template-columns: 1fr 1fr; align-items: center;\n    gap: clamp(30px, 6vw, 92px);\n    padding: clamp(70px, 11vh, 130px) clamp(20px, 4vw, 56px);\n    max-width: 1480px; margin: 0 auto;\n  }\n  .feature.flip .feature-copy { order: 2; }\n  .feature.flip .feature-media { order: 1; }\n  .feature-copy { max-width: 460px; }\n  .feature.flip .feature-copy { justify-self: end; }\n  .feature h2 {\n    font-weight: 400; font-size: clamp(32px, 4vw, 54px); line-height: 1.04;\n    letter-spacing: -0.03em; margin: 18px 0 0; color: var(--ink); text-wrap: balance;\n  }\n  .feature p { font-size: clamp(17px,1.4vw,19px); color: var(--ink-soft); margin: 20px 0 0; max-width: 40ch; text-wrap: pretty; }\n  .feature .idx { font-family: var(--mono); font-size: 13px; color: var(--faint); letter-spacing: 0.1em; }\n  .feature-media { position: relative; }\n  .feature-photo {\n    width: 100%; height: clamp(360px, 46vw, 620px); border-radius: var(--rad); overflow: hidden;\n    background: linear-gradient(145deg, #e6e8da 0%, #d0d8c6 100%);\n    box-shadow: 0 46px 84px -52px rgba(31,45,39,0.45);\n  }\n  .feature-photo image-slot { width: 100%; height: 100%; }\n  .feature-cap { margin: 18px 4px 0; font-size: 17px; color: var(--ink-soft); }\n  .feature.flip .feature-cap { text-align: right; }\n\n  @media (max-width: 900px) {\n    .feature { grid-template-columns: 1fr; gap: 26px; }\n    .feature.flip .feature-copy, .feature.flip .feature-media { order: 0; }\n    .feature-copy, .feature.flip .feature-copy { justify-self: stretch; max-width: none; }\n    .feature-photo { height: 58svh; min-height: 360px; }\n    .feature.flip .feature-cap { text-align: left; }\n  }\n\n  /* ============================ BEYOND ============================ */\n  .beyond { padding: clamp(60px, 9vh, 110px) 0; }\n  .beyond-head { max-width: 620px; margin-bottom: clamp(36px, 5vw, 56px); }\n  .beyond-head h2 { font-weight: 400; font-size: clamp(30px, 4vw, 50px); line-height: 1.05; letter-spacing: -0.03em; margin: 16px 0 0; text-wrap: balance; }\n  .beyond-head p { color: var(--ink-soft); margin: 18px 0 0; font-size: clamp(16px,1.4vw,19px); }\n  .beyond-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  .bcard {\n    border: 1px solid var(--line); border-radius: 22px; padding: 30px 28px 32px;\n    background: transparent; position: relative; overflow: hidden;\n    transition: transform .3s var(--ease), background .3s, border-color .3s, box-shadow .3s;\n  }\n  .bcard:hover { transform: translateY(-5px); background: var(--white); border-color: transparent; box-shadow: 0 34px 60px -40px rgba(44,31,24,0.32); }\n  .bcard .num { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.1em; }\n  .bcard h3 { font-weight: 500; font-size: 23px; letter-spacing: -0.01em; margin: 16px 0 0; }\n  .bcard p { color: var(--ink-soft); font-size: 16px; margin: 10px 0 0; }\n  .bcard .ic { width: 42px; height: 42px; margin-top: 22px; color: var(--accent); }\n  .bcard .ic svg { width: 100%; height: 100%; }\n  @media (max-width: 820px) { .beyond-grid { grid-template-columns: 1fr; } }\n\n  /* ============================ WHO IT'S FOR ============================ */\n  .who { text-align: center; padding: clamp(80px, 13vh, 150px) 20px; }\n  .who h2 {\n    font-weight: 400; font-size: clamp(34px, 5.2vw, 68px); line-height: 1.05;\n    letter-spacing: -0.035em; margin: 22px auto 0; max-width: 18ch; text-wrap: balance; color: var(--ink);\n  }\n  .who-tags { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 40px 0 0; }\n  .who-tags span {\n    border: 1px solid var(--line); border-radius: 999px; padding: 12px 22px;\n    font-size: 16px; color: var(--ink-soft); background: var(--white);\n    transition: transform .2s var(--ease), color .2s, border-color .2s;\n  }\n  .who-tags span:hover { transform: translateY(-2px); color: var(--ink); border-color: var(--accent); }\n\n  /* ============================ CLOSING CTA ============================ */\n  .closing { padding: 0 clamp(16px, 3vw, 40px) clamp(40px, 6vw, 64px); }\n  .closing-card {\n    position: relative; max-width: 1480px; margin: 0 auto;\n    border-radius: var(--rad); overflow: hidden;\n    background: linear-gradient(145deg, #213a2e 0%, #0f1d16 100%);\n    min-height: clamp(520px, 72svh, 760px);\n    display: flex; align-items: flex-end;\n  }\n  .closing-card image-slot { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }\n  .closing-card .scrim {\n    position: absolute; inset: 0; z-index: 1;\n    background: linear-gradient(180deg, rgba(20,12,8,0.05) 0%, rgba(20,12,8,0.18) 40%, rgba(20,12,8,0.72) 100%);\n  }\n  .closing-inner { position: relative; z-index: 2; padding: clamp(36px, 6vw, 72px); color: #fdf6ee; max-width: 720px; }\n  .closing-inner h2 {\n    font-weight: 400; font-size: clamp(34px, 5vw, 66px); line-height: 1.04;\n    letter-spacing: -0.035em; margin: 18px 0 0; text-wrap: balance;\n  }\n  .closing-inner h2 em { font-style: italic; color: #9fd9bb; }\n  .closing-inner p { color: rgba(253,246,238,0.82); margin: 18px 0 0; font-size: clamp(17px,1.5vw,20px); max-width: 44ch; }\n\n  /* ============================ EMAIL CAPTURE ============================ */\n  .capture { margin: 30px 0 0; width: 100%; max-width: 500px; }\n  .form { display: flex; gap: 10px; }\n  .form .email { flex: 1 1 auto; }\n  input.email {\n    width: 100%; font-family: var(--sans); font-size: 16px; color: #fff;\n    background: rgba(255,253,248,0.12); border: 1px solid rgba(255,253,248,0.3);\n    border-radius: 999px; padding: 16px 22px; outline: none;\n    transition: border-color .18s, box-shadow .18s, background .18s;\n  }\n  input.email::placeholder { color: rgba(253,246,238,0.6); }\n  input.email:focus { border-color: #7fc4a3; background: rgba(255,253,248,0.18); box-shadow: 0 0 0 3px rgba(127,196,163,0.24); }\n  input.email.invalid { border-color: #ff9b76; box-shadow: 0 0 0 3px rgba(255,155,118,0.25); animation: shake .4s; }\n  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }\n  .reassure { font-family: var(--mono); font-size: 12px; color: rgba(253,246,238,0.66); margin: 14px 0 0; letter-spacing: 0.03em; }\n  .success {\n    background: rgba(255,253,248,0.14); border: 1px solid rgba(255,253,248,0.3);\n    border-radius: 22px; padding: 24px 26px; max-width: 460px;\n    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);\n  }\n  .success .row { display: flex; align-items: center; gap: 14px; }\n  .success .check {\n    width: 46px; height: 46px; border-radius: 50%; flex: 0 0 auto;\n    background: #6fcf97; display: flex; align-items: center; justify-content: center;\n    animation: popIn .5s cubic-bezier(.2,1.3,.4,1) both;\n  }\n  .success h3 { font-weight: 600; font-size: 22px; margin: 0; color: #fff; }\n  .success p { margin: 4px 0 0; color: rgba(253,246,238,0.82); font-size: 15px; }\n  @keyframes popIn { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }\n  @media (max-width: 520px) { .form { flex-direction: column; } .form .btn { width: 100%; justify-content: center; } }\n\n  /* ============================ FOOTER ============================ */\n  footer.foot {\n    padding: clamp(40px, 6vw, 64px) clamp(20px,4vw,56px);\n    display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;\n    border-top: 1px solid var(--line);\n  }\n  .foot .brand { color: var(--ink); }\n  .foot .copy { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--faint); text-transform: uppercase; }\n\n  /* ============================ REVEAL ============================ */\n  .reveal { opacity: 1; transform: none; }\n  html.anim-ready .reveal { opacity: 0; transform: translateY(28px); transition: opacity .8s var(--ease), transform .8s var(--ease); }\n  html.anim-ready .reveal.in { opacity: 1; transform: none; }\n  html.anim-ready .reveal.d1 { transition-delay: .08s; }\n  html.anim-ready .reveal.d2 { transition-delay: .16s; }\n  html.anim-ready .reveal.d3 { transition-delay: .24s; }\n  html.anim-off .reveal,\n  html.anim-off .media-reveal,\n  html.anim-off .media-reveal img,\n  html.anim-off .media-reveal image-slot { opacity: 1 !important; transform: none !important; clip-path: none !important; transition: none !important; }\n\n  .media-reveal { clip-path: inset(0 0 0 0 round var(--rad)); }\n  html.anim-ready .media-reveal { clip-path: inset(0 100% 0 0 round var(--rad)); }\n  html.anim-ready .media-reveal.in { clip-path: inset(0 0 0 0 round var(--rad)); transition: clip-path 1s var(--ease); }\n  html.anim-ready .feature.flip .media-reveal { clip-path: inset(0 0 0 100% round var(--rad)); }\n  html.anim-ready .media-reveal img, html.anim-ready .media-reveal image-slot { transform: scale(1.08); transition: transform 1.2s var(--ease); }\n  html.anim-ready .media-reveal.in img, html.anim-ready .media-reveal.in image-slot { transform: scale(1); }\n\n  /* ============================ CONFETTI ============================ */\n  .confetti-piece { position: fixed; top: -12px; width: 9px; height: 14px; border-radius: 2px; z-index: 999; pointer-events: none; will-change: transform, opacity; }\n  @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: .9; } }\n\n  @media (prefers-reduced-motion: reduce) {\n    html { scroll-behavior: auto; }\n    .reveal, .media-reveal, .hero-copy > *, .hero-photo, .nav .pill { opacity: 1 !important; transform: none !important; clip-path: none !important; transition: none !important; }\n    .marquee-track { animation: none !important; }\n    .reveal-words .w { opacity: 1 !important; transform: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- ============ NAV ============ -->\n  <header class=\"nav\">\n    <a class=\"pill brand\" href=\"#top\"><span class=\"mark\"><\u002Fspan>Lean Founders<\u002Fa>\n    <nav class=\"pill nav-center\">\n      <a href=\"#what\">What you get<\u002Fa>\n      <a href=\"#why\">Why now<\u002Fa>\n      <a href=\"#who\">Who it's for<\u002Fa>\n    <\u002Fnav>\n    <button class=\"pill nav-cta\" type=\"button\" data-join=\"\">Count me in →<\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section class=\"hero\" id=\"top\" data-screen-label=\"Hero\">\n    <div class=\"hero-copy\">\n      <span class=\"label\">Feedback &amp; distribution · Tri-state<\u002Fspan>\n      <h1>Feedback and distribution for <em>founders.<\u002Fem><\u002Fh1>\n      <p class=\"sub\">A curated group of founders across the tri-state area helping each other build the right thing — and get it in front of the right people.<\u002Fp>\n      <div class=\"meta\">\n        <span>Small group<\u002Fspan><span>In‑person<\u002Fspan><span>Founder‑led<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-actions\">\n        <button class=\"btn btn-primary\" type=\"button\" data-join=\"\">Count me in <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n        <a class=\"btn btn-ghost\" href=\"#what\">See what you get<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-photo\">\n      <div class=\"hero-cell a\">\n        <image-slot id=\"hero\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a hero photo — founders in conversation, a meetup, a workspace\" src=\"data:image/webp;base64,UklGRp4WAQBXRUJQVlA4WAoAAAAgAAAAHwMArwQASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAA    <h2>Some months, we go bigger.<\u002Fh2>\n        <p>Depending on what members need, we may also organize moments designed around the same two goals: better feedback, and better distribution.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"beyond-grid reveal\">\n        <article class=\"bcard\">\n          <span class=\"num\">01<\u002Fspan>\n          <h3>Demo days &amp; special events<\u002Fh3>\n          <p>Show the work in progress, get a room's worth of reactions, and meet builders outside the core circle.<\u002Fp>\n          <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 17v4\"><\u002Fpath><path d=\"m9 11 2.5 2L16 9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <\u002Farticle>\n        <article class=\"bcard\">\n          <span class=\"num\">02<\u002Fspan>\n          <h3>Product showcases<\u002Fh3>\n          <p>Put your product in front of people who can use it, share it, or tell you exactly why they wouldn't.<\u002Fp>\n          <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3 4 7v6c0 4.5 3.4 7.3 8 8.5 4.6-1.2 8-4 8-8.5V7l-8-4Z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <\u002Farticle>\n        <article class=\"bcard\">\n          <span class=\"num\">03<\u002Fspan>\n          <h3>Launch support<\u002Fh3>\n          <p>When it's go time, the circle shows up — resharing, intros, and the early momentum that's hardest to get alone.<\u002Fp>\n          <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4.5 16.5 3 21l4.5-1.5\"><\u002Fpath><path d=\"M14 5c4 1 6 4 6 9-5 0-8-2-9-6\"><\u002Fpath><path d=\"M9 15c-2-2-2-6 1-9 3-3 7-3 9-3 0 2 0 6-3 9-3 3-5 3-7 3Z\"><\u002Fpath><circle cx=\"14.5\" cy=\"9.5\" r=\"1.3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHO IT'S FOR ============ -->\n  <section class=\"who\" id=\"who\" data-screen-label=\"Who it's for\">\n    <div class=\"wrap reveal\">\n      <span class=\"label\" style=\"display:inline-flex\"><span class=\"sq\"><\u002Fspan>Who it's for<\u002Fspan>\n      <h2>Solo entrepreneurs and lean teams building real products.<\u002Fh2>\n      <div class=\"who-tags\">\n        <span>Bootstrapped<\u002Fspan><span>Pre‑seed<\u002Fspan><span>Early‑stage<\u002Fspan><span>Actively building<\u002Fspan><span>Tri‑state area<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CLOSING ============ -->\n  <section class=\"closing\" data-screen-label=\"Closing CTA\">\n    <div class=\"closing-card reveal\">\n      <image-slot id=\"closing\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a photo — warm, in-person, a group of founders\"><\u002Fimage-slot>\n      <span class=\"scrim\" aria-hidden=\"true\"><\u002Fspan>\n      <div class=\"closing-inner\">\n        <span class=\"label on-dark\"><span class=\"sq\"><\u002Fspan>Interested?<\u002Fspan>\n        <h2>If you're building and this resonates — <em>count yourself in.<\u002Fem><\u002Fh2>\n        <p>Small group. In-person. Founder-led. Leave your email and we'll send one invite to the next session.<\u002Fp>\n        <div class=\"capture\" id=\"capture\">\n          <form class=\"form\" id=\"signupForm\" novalidate=\"\">\n            <input class=\"email\" id=\"emailInput\" type=\"email\" inputmode=\"email\" autocomplete=\"email\" placeholder=\"your@email.com\" aria-label=\"Your email address\">\n            <button class=\"btn btn-light\" type=\"submit\">Count me in <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n          <\u002Fform>\n          <p class=\"reassure\">Free to join · One invite to the next session · No spam, ever.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"success\" id=\"successState\" hidden=\"\">\n          <div class=\"row\">\n            <div class=\"check\" aria-hidden=\"true\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10331f\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div><h3>You're in.<\u002Fh3><p>We'll send one invite to the next session. Welcome to the circle.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer class=\"foot\" data-screen-label=\"Footer\">\n    <a class=\"pill brand\" href=\"#top\" style=\"border:1px solid var(--line); background:var(--white)\"><span class=\"mark\"><\u002Fspan>Lean Founders<\u002Fa>\n    <p class=\"copy\">Feedback &amp; distribution for founders · NYC · NJ · CT<\u002Fp>\n  <\u002Ffooter>\n\n  <script>\n    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    /* ---------- Entrance failsafe (timers fire even when the animation clock is throttled) ---------- */\n    setTimeout(function () { document.documentElement.classList.add('entrance-done'); }, 1600);\n\n    /* ---------- Scroll reveal ---------- */\n    (function () {\n      var html = document.documentElement;\n      var reveals = [].slice.call(document.querySelectorAll('.reveal, .media-reveal'));\n      function showAll() { reveals.forEach(function (el) { el.classList.add('in'); }); }\n      if (reduce || !('IntersectionObserver' in window)) { html.classList.add('anim-off'); showAll(); return; }\n      html.classList.add('anim-ready');\n      var vh = window.innerHeight || 800;\n      reveals.forEach(function (el) { if (el.getBoundingClientRect().top < vh * 0.92) el.classList.add('in'); });\n      var io = new IntersectionObserver(function (entries) {\n        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n      }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });\n      reveals.forEach(function (el) { io.observe(el); });\n      // last-resort safety: force everything visible if the clock is throttled\n      setTimeout(function () { html.classList.add('anim-off'); }, 5000);\n    })();\n\n    /* ---------- ASCII / symbol field (Why Now) ---------- */\n    (function () {\n      var canvas = document.getElementById('asciiCanvas');\n      if (!canvas) return;\n      var ctx = canvas.getContext('2d');\n      var glyphs = ['Ω', '#', '+', 'Ω', 'Ω', '·'];\n      var cell = 26, cols = 0, rows = 0, grid = [], W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);\n      var t = 0;\n\n      function build() {\n        var rect = canvas.parentElement.getBoundingClientRect();\n        W = rect.width; H = rect.height;\n        canvas.width = W * dpr; canvas.height = H * dpr;\n        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n        cols = Math.ceil(W / cell); rows = Math.ceil(H / cell);\n        var cx = cols / 2, cy = rows / 2;\n        var R = Math.min(cols, rows) * 0.46;\n        grid = [];\n        for (var y = 0; y < rows; y++) {\n          for (var x = 0; x < cols; x++) {\n            var dx = (x - cx) / R, dy = (y - cy) / (R * 1.02);\n            var d = Math.sqrt(dx * dx + dy * dy);\n            // sphere-ish density: more glyphs near center, sparse outside\n            var inside = d < 1;\n            var p = inside ? (0.16 + 0.5 * (1 - d)) : Math.max(0, 0.12 * (1.5 - d));\n            if (Math.random() < p) {\n              grid.push({\n                x: x * cell + cell * 0.5,\n                y: y * cell + cell * 0.62,\n                g: glyphs[Math.floor(Math.random() * glyphs.length)],\n                base: inside ? (0.18 + 0.5 * (1 - d)) : 0.12,\n                ph: Math.random() * Math.PI * 2,\n                sp: 0.6 + Math.random() * 1.4\n              });\n            }\n          }\n        }\n      }\n\n      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n      function draw() {\n        ctx.clearRect(0, 0, W, H);\n        ctx.font = '15px \"DM Mono\", monospace';\n        for (var i = 0; i < grid.length; i++) {\n          var c = grid[i];\n          var tw = 0.55 + 0.45 * Math.sin(t * c.sp + c.ph);\n          var a = c.base * (0.45 + 0.55 * tw);\n          ctx.fillStyle = 'rgba(127, 196, 163,' + a.toFixed(3) + ')';\n          ctx.fillText(c.g, c.x, c.y);\n        }\n        t += 0.012;\n        raf = requestAnimationFrame(draw);\n      }\n\n      var raf;\n      function start() { cancelAnimationFrame(raf); build(); if (!reduce) draw(); else { ctx.font = '15px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; for (var i=0;i<grid.length;i++){var c=grid[i];ctx.fillStyle='rgba(127,196,163,'+(c.base*0.7).toFixed(3)+')';ctx.fillText(c.g,c.x,c.y);} } }\n      start();\n      var rt;\n      window.addEventListener('resize', function () { clearTimeout(rt); rt = setTimeout(start, 200); });\n    })();\n\n    /* ---------- Why Now sequenced narrative ---------- */\n    (function () {\n      var seq = document.querySelector('[data-seq]');\n      var stat = document.getElementById('statBig');\n      var foot = document.getElementById('whynowFoot');\n      if (!seq) return;\n      var lines = [\n        { html: 'We\\u2019re entering the era of the <span class=\"em\">lean founder.<\u002Fspan>' },\n        { html: 'An estimated <span class=\"em\">25\\u201330 million<\u002Fspan> solopreneurs are building in the U.S., powered by AI and modern tools.' },\n        { html: 'Building is becoming <span class=\"em\">easier.<\u002Fspan>' },\n        { html: 'Feedback and distribution <span class=\"em\">are not.<\u002Fspan>' }\n      ];\n      var idx = 0, started = false, timer;\n\n      function wrapWords(el) {\n        // animate by splitting existing innerHTML text nodes into spans is complex with markup;\n        // simpler: fade the whole line in.\n      }\n      function show(i) {\n        seq.style.transition = 'opacity .5s ease, transform .5s ease';\n        seq.style.opacity = '0'; seq.style.transform = 'translateY(12px)';\n        setTimeout(function () {\n          seq.innerHTML = lines[i].html;\n          seq.style.opacity = '1'; seq.style.transform = 'none';\n        }, 380);\n      }\n      function loopStart() {\n        if (started) return; started = true;\n        idx = 0;\n        timer = setInterval(function () {\n          idx++;\n          if (idx >= lines.length) {\n            idx = 0;\n            if (foot.hidden) {\n              setTimeout(function () {\n                foot.hidden = false; foot.style.opacity = 0; foot.style.transition = 'opacity .7s ease';\n                foot.innerHTML = 'That\\u2019s why Lean Founders exists.';\n                requestAnimationFrame(function () { foot.style.opacity = 1; });\n              }, 900);\n            }\n          }\n          show(idx);\n        }, 2200);\n      }\n      var io = new IntersectionObserver(function (es) {\n        es.forEach(function (e) { if (e.isIntersecting) { loopStart(); io.disconnect(); } });\n      }, { threshold: 0.4 });\n      io.observe(document.querySelector('.whynow'));\n    })();\n\n    /* ---------- Hero photo subtle parallax ---------- */\n    (function () {\n      if (reduce) return;\n      var photo = document.querySelector('.hero-cell.a image-slot');\n      if (!photo) return;\n      var ticking = false;\n      window.addEventListener('scroll', function () {\n        if (ticking) return; ticking = true;\n        requestAnimationFrame(function () {\n          var y = window.scrollY;\n          if (y < window.innerHeight * 1.2) photo.style.transform = 'translateY(' + (y * 0.06) + 'px) scale(1.04)';\n          ticking = false;\n        });\n      }, { passive: true });\n    })();\n\n    /* ---------- Confetti ---------- */\n    function launchConfetti() {\n      if (reduce) return;\n      var colors = ['#2f6f57', '#7fc4a3', '#4d8f70', '#a9d9bf', '#e0b04a', '#cf7a4a'];\n      for (var i = 0; i < 90; i++) {\n        var p = document.createElement('span');\n        p.className = 'confetti-piece';\n        p.style.background = colors[Math.floor(Math.random() * colors.length)];\n        p.style.left = Math.random() * 100 + 'vw';\n        var dur = 2.4 + Math.random() * 2.2, delay = Math.random() * 0.5;\n        p.style.animation = 'confettiFall ' + dur + 's cubic-bezier(.3,.4,.5,1) ' + delay + 's forwards';\n        if (Math.random() > 0.5) { p.style.width = '7px'; p.style.height = '7px'; p.style.borderRadius = '50%'; }\n        document.body.appendChild(p);\n        (function (el, ttl) { setTimeout(function () { el.remove(); }, (ttl + 0.6) * 1000); })(p, dur + delay);\n      }\n    }\n\n    /* ---------- Email capture ---------- */\n    (function () {\n      var form = document.getElementById('signupForm');\n      var input = document.getElementById('emailInput');\n      var success = document.getElementById('successState');\n      var capture = document.getElementById('capture');\n      var RE = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\n      input.addEventListener('input', function () { input.classList.remove('invalid'); });\n      form.addEventListener('submit', function (e) {\n        e.preventDefault();\n        var v = input.value.trim();\n        if (!RE.test(v)) { input.classList.remove('invalid'); void input.offsetWidth; input.classList.add('invalid'); input.focus(); return; }\n        // NOTE: wire this POST to your form backend (Tally / Mailchimp / ConvertKit).\n        capture.setAttribute('hidden', ''); success.removeAttribute('hidden'); launchConfetti();\n      });\n    })();\n\n    /* ---------- Join buttons -> closing capture ---------- */\n    (function () {\n      var card = document.querySelector('.closing-card');\n      var input = document.getElementById('emailInput');\n      function jump() {\n        card.scrollIntoView ? window.scrollTo({ top: card.getBoundingClientRect().top + window.scrollY - 40, behavior: reduce ? 'auto' : 'smooth' }) : null;\n        setTimeout(function () { if (!document.getElementById('capture').hasAttribute('hidden')) input.focus({ preventScroll: true }); }, reduce ? 0 : 600);\n      }\n      [].slice.call(document.querySelectorAll('[data-join]')).forEach(function (b) { b.addEventListener('click', jump); });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
    <script>
      // Visual overrides for the bundled offline page.
      (function () {
        var HERO_IMAGE =
          "https://images.pexels.com/photos/12903131/pexels-photo-12903131.jpeg?auto=compress&cs=tinysrgb&w=1600";

        function addVisualStyles() {
          if (document.getElementById("leanfounders-visual-overrides")) return;
          var style = document.createElement("style");
          style.id = "leanfounders-visual-overrides";
          style.textContent = [
            ".hero-photo{grid-template-rows:1fr!important;gap:0!important;height:clamp(520px,86svh,880px)!important}",
            ".hero-photo .hero-cell{height:100%!important}",
            ".hero-photo .hero-cell.b{display:none!important}",
            ".hero-photo .hero-single-img{width:100%;height:100%;display:block;object-fit:cover;object-position:45% 50%}",
            ".feature-photo image-slot,.feature-photo img{object-position:100% center!important;background-position:100% center!important}",
            "@media (max-width:900px){.hero-photo{height:62svh!important;min-height:420px!important}}",
          ].join("\n");
          (document.head || document.documentElement).appendChild(style);
        }

        function applyHeroImage() {
          var heroPhoto = document.querySelector(".hero-photo");
          if (!heroPhoto || heroPhoto.dataset.singleImageApplied === "true")
            return false;

          var firstCell = heroPhoto.querySelector(".hero-cell");
          if (!firstCell) return false;

          firstCell.classList.add("hero-single");
          firstCell.innerHTML =
            '<img class="hero-single-img" src="' +
            HERO_IMAGE +
            '" alt="Founder working on a laptop">' +
            '<div class="glass-cap"><span class="dot"></span>Next session forming now</div>';

          var extraCells = heroPhoto.querySelectorAll(
            ".hero-cell:not(:first-child)",
          );
          extraCells.forEach(function (cell) {
            cell.remove();
          });
          heroPhoto.dataset.singleImageApplied = "true";
          return true;
        }

        function applyFeaturePosition() {
          var slot = document.getElementById("feat-feedback");
          if (!slot) return;
          slot.style.objectPosition = "100% center";
          slot.style.backgroundPosition = "100% center";
          var img = slot.querySelector && slot.querySelector("img");
          if (img) img.style.objectPosition = "100% center";
          if (slot.shadowRoot) {
            var shadowImg = slot.shadowRoot.querySelector("img");
            if (shadowImg) {
              shadowImg.style.objectPosition = "100% center";
              shadowImg.style.width = "100%";
              shadowImg.style.height = "100%";
              shadowImg.style.objectFit = "cover";
            }
          }
        }

        function runVisualOverrides() {
          addVisualStyles();
          applyHeroImage();
          applyFeaturePosition();
        }

        document.addEventListener("DOMContentLoaded", function () {
          var attempts = 0;
          var timer = setInterval(function () {
            attempts += 1;
            runVisualOverrides();
            if (
              document.querySelector(
                ".hero-photo[data-single-image-applied='true']",
              ) ||
              attempts > 80
            ) {
              clearInterval(timer);
            }
          }, 100);
        });
      })();
    </script>

    <script>
      // Save offline-page signups to the same Google Sheet used by index.html.
      (function () {
        var SHEET_URL =
          "https://script.google.com/macros/s/AKfycby-LlqEjm7_O4ACR_9E9W0ViufZyDIjyL_ZoaKkL9BvRwsne7t3hiuESbHyH8MT9_OewA/exec";
        var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        document.addEventListener(
          "submit",
          function (event) {
            var form = event.target;
            if (!form || form.id !== "signupForm") return;

            var input = form.querySelector(
              'input[type="email"], input[placeholder*="mail" i]',
            );
            if (!input) return;

            var email = input.value.trim();
            if (!EMAIL_RE.test(email)) return;

            fetch(SHEET_URL, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: email,
                secret: "buyersideeproject",
              }),
            }).catch(function (err) {
              console.error("Failed to save email:", err);
            });
          },
          true,
        );
      })();
    </script>
